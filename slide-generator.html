<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFTERFRAME — Slide Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; color: #b8d8b8; font-family: 'Share Tech Mono', monospace; min-height: 100vh; padding: 24px; }
.app { max-width: 1100px; margin: 0 auto; }
.header { text-align: center; padding: 20px 0 28px; }
.header h1 { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; letter-spacing: 8px; color: #4dff4d; margin-bottom: 4px; }
.header p { font-size: 10px; letter-spacing: 4px; color: #4a6e4a; }

.panel { background: #080808; border: 1px solid #1a1a1a; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.panel-label { font-size: 9px; letter-spacing: 4px; color: #4dff4d; text-transform: uppercase; margin-bottom: 16px; display: block; }

/* IMAGE GRID */
.img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; max-height: 360px; overflow-y: auto; padding-right: 4px; }
.img-grid::-webkit-scrollbar { width: 4px; }
.img-grid::-webkit-scrollbar-thumb { background: #4dff4d; border-radius: 2px; }
.img-thumb { position: relative; aspect-ratio: 3/4; overflow: hidden; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; background: #0a0a0a; }
.img-thumb:hover { border-color: rgba(77,255,77,0.4); }
.img-thumb.selected { border-color: #4dff4d; }
.img-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.img-thumb .tick { position: absolute; top: 4px; right: 4px; background: #4dff4d; color: #000; width: 22px; height: 22px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
.img-thumb.selected .tick { display: flex; }
.loading-msg { color: #333; font-size: 12px; letter-spacing: 2px; padding: 24px; text-align: center; grid-column: 1/-1; }

/* FORM */
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 9px; letter-spacing: 3px; color: #4a6e4a; text-transform: uppercase; }
.field input, .field textarea, .field select { background: #030303; border: 1px solid #1a1a1a; color: #ddd; font-family: 'Share Tech Mono', monospace; font-size: 13px; padding: 11px 14px; border-radius: 8px; outline: none; transition: border-color 0.2s; width: 100%; }
.field input:focus, .field textarea:focus, .field select:focus { border-color: #4dff4d; }
.field textarea { resize: vertical; min-height: 90px; }

.blur-section { margin-bottom: 20px; }
.blur-section label { font-size: 9px; letter-spacing: 3px; color: #4a6e4a; text-transform: uppercase; display: block; margin-bottom: 10px; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }
.chip { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 100px; padding: 5px 14px; font-size: 11px; color: #555; cursor: pointer; transition: all 0.2s; user-select: none; }
.chip:hover { border-color: #333; color: #888; }
.chip.on { background: rgba(77,255,77,0.1); border-color: rgba(77,255,77,0.35); color: #4dff4d; }

.btn-row { display: flex; gap: 10px; }
.btn { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 2px; padding: 13px 28px; cursor: pointer; border-radius: 100px; transition: all 0.2s; border: none; text-transform: uppercase; }
.btn-g { background: #4dff4d; color: #000; font-weight: 700; }
.btn-g:hover { background: #3de63d; }
.btn-o { background: transparent; color: #555; border: 1px solid #1a1a1a; }
.btn-o:hover { border-color: #4dff4d; color: #4dff4d; }

/* SELECTED PREVIEW */
.sel-preview { display: flex; align-items: center; gap: 12px; background: rgba(77,255,77,0.04); border: 1px solid rgba(77,255,77,0.15); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; }
.sel-preview img { width: 48px; height: 64px; object-fit: cover; border-radius: 6px; }
.sel-info { flex: 1; min-width: 0; }
.sel-model { font-size: 10px; letter-spacing: 2px; color: #4dff4d; margin-bottom: 4px; }
.sel-prompt { font-size: 11px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.clr-sel { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #333; background: none; border: none; cursor: pointer; }
.clr-sel:hover { color: #888; }

/* OUTPUT */
.slides-wrap { margin-top: 8px; }
.slides-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.slides-top span { font-size: 9px; letter-spacing: 4px; color: #4dff4d; text-transform: uppercase; }
.dl-all { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px; padding: 8px 18px; cursor: pointer; border-radius: 100px; background: transparent; border: 1px solid #1a1a1a; color: #555; transition: all 0.2s; text-transform: uppercase; }
.dl-all:hover { border-color: #4dff4d; color: #4dff4d; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.slide-item { }
.canvas-wrap { width: 100%; aspect-ratio: 3/4; background: #000; border: 1px solid #1a1a1a; border-radius: 8px; overflow: hidden; }
canvas { width: 100%; height: 100%; display: block; }
.slide-btns { display: flex; gap: 8px; margin-top: 8px; }
.s-btn { flex: 1; font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 9px; cursor: pointer; border-radius: 6px; transition: all 0.2s; text-transform: uppercase; }
.s-dl { background: #4dff4d; color: #000; border: none; font-weight: 700; }
.s-dl:hover { background: #3de63d; }
.s-rm { background: transparent; color: #444; border: 1px solid #1a1a1a; }
.s-rm:hover { border-color: #ff4444; color: #ff4444; }
.empty { text-align: center; padding: 48px; color: #222; font-size: 12px; letter-spacing: 2px; grid-column: 1/-1; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>AFTERFRAME</h1>
    <p>> INSTAGRAM SLIDE GENERATOR // 1080 × 1440</p>
  </div>

  <!-- STEP 1 — PICK IMAGE -->
  <div class="panel">
    <span class="panel-label">> Step 1 — Select an image from your library</span>
    <div class="img-grid" id="imgGrid">
      <div class="loading-msg">Loading your images...</div>
    </div>
  </div>

  <!-- STEP 2 — SETTINGS -->
  <div class="panel">
    <span class="panel-label">> Step 2 — Customise your slide</span>

    <div id="selPreview" style="display:none;" class="sel-preview">
      <img id="prevImg" src="" alt="">
      <div class="sel-info">
        <div class="sel-model" id="prevModel"></div>
        <div class="sel-prompt" id="prevPromptTxt"></div>
      </div>
      <button class="clr-sel" onclick="clearSel()">✕</button>
    </div>

    <div class="row">
      <div class="field">
        <label>AI Model (auto-filled)</label>
        <select id="aiModel">
          <option>Midjourney v8 Alpha</option>
          <option>Midjourney v7</option>
          <option>Midjourney v6.1</option>
          <option>Midjourney v6</option>
          <option>Nano Banana Pro</option>
          <option>Flux 1.1 Dev</option>
          <option>Stable Diffusion XL</option>
          <option>DALL-E 3</option>
        </select>
      </div>
      <div class="field">
        <label>Category (auto-filled)</label>
        <select id="category">
          <optgroup label="Models">
            <option>Female</option>
            <option>Fashion</option>
            <option>Fitness</option>
            <option>Street</option>
            <option>Cinematic</option>
            <option>Surreal</option>
          </optgroup>
          <optgroup label="Explore">
            <option>Landscape</option>
            <option>Abstract</option>
            <option>Architecture</option>
            <option>Nature</option>
            <option>Conceptual</option>
            <option>Editorial</option>
            <option>Product</option>
            <option>Portrait</option>
          </optgroup>
        </select>
      </div>
    </div>

    <div class="field" style="margin-bottom:16px;">
      <label>Prompt (auto-filled from image)</label>
      <textarea id="prompt" placeholder="Select an image above — prompt auto-fills..." oninput="buildChips()"></textarea>
    </div>

    <div class="blur-section">
      <label>Click words to blur on the slide</label>
      <div class="chips" id="chips"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-g" onclick="generate()">+ Generate slide</button>
      <button class="btn btn-o" onclick="clearAll()">Clear all</button>
    </div>
  </div>

  <!-- OUTPUT -->
  <div class="slides-wrap" id="slidesWrap" style="display:none;">
    <div class="slides-top">
      <span>> Generated slides (1080×1440)</span>
      <button class="dl-all" onclick="dlAll()">↓ Download all</button>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
const SB_URL = 'https://jbsyzrzoiawruusdowpx.supabase.co';
const SB_KEY = 'sb_publishable_5yHqsw-CdIykq2jiCDwTpw_otaDsUlF';
const W = 1080, H = 1440;

let slides = [];
let blurred = new Set();
let selectedImg = null;
let allImages = [];

window.onload = async function() {
  try {
    const r = await fetch(SB_URL + '/rest/v1/images?select=*&order=created_at.desc&limit=60', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    allImages = await r.json();
    if (!Array.isArray(allImages)) allImages = [];
    renderImgGrid();
  } catch(e) {
    document.getElementById('imgGrid').innerHTML = '<div class="loading-msg">Failed to load images</div>';
  }
};

function renderImgGrid() {
  const grid = document.getElementById('imgGrid');
  if (!allImages.length) { grid.innerHTML = '<div class="loading-msg">No images found — upload some in your admin panel first!</div>'; return; }
  grid.innerHTML = allImages.map(img => `
    <div class="img-thumb" id="th-${img.id}" onclick="selectImg('${img.id}')">
      <img src="${img.image_url}" alt="" loading="lazy" onerror="this.closest('.img-thumb').style.display='none'">
      <div class="tick">✓</div>
    </div>`).join('');
}

function selectImg(id) {
  const img = allImages.find(i => i.id === id);
  if (!img) return;
  selectedImg = img;
  document.querySelectorAll('.img-thumb').forEach(t => t.classList.remove('selected'));
  document.getElementById('th-' + id).classList.add('selected');

  // Auto fill prompt
  document.getElementById('prompt').value = img.prompt || '';
  buildChips();

  // Auto fill AI model
  const modelSel = document.getElementById('aiModel');
  const modelVal = (img.ai_model || '').toLowerCase();
  for (let i = 0; i < modelSel.options.length; i++) {
    if (modelSel.options[i].text.toLowerCase().replace(/\s/g,'').includes(modelVal.replace(/\s/g,'').substring(0,8))) {
      modelSel.selectedIndex = i; break;
    }
  }

  // Auto fill category based on ai_model or default
  // Category stored in image if available
  if (img.category) {
    const catSel = document.getElementById('category');
    for (let i = 0; i < catSel.options.length; i++) {
      if (catSel.options[i].value.toLowerCase() === img.category.toLowerCase()) {
        catSel.selectedIndex = i; break;
      }
    }
  }

  // Show preview
  document.getElementById('prevImg').src = img.image_url;
  document.getElementById('prevModel').textContent = img.ai_model || '';
  document.getElementById('prevPromptTxt').textContent = img.prompt || '';
  document.getElementById('selPreview').style.display = 'flex';
}

function clearSel() {
  selectedImg = null;
  document.querySelectorAll('.img-thumb').forEach(t => t.classList.remove('selected'));
  document.getElementById('selPreview').style.display = 'none';
  document.getElementById('prompt').value = '';
  document.getElementById('chips').innerHTML = '';
}

function buildChips() {
  const words = document.getElementById('prompt').value.trim().split(/\s+/).filter(w => w.replace(/[^a-z0-9]/gi,'').length > 2);
  const container = document.getElementById('chips');
  container.innerHTML = '';
  const seen = new Set();
  blurred = new Set([...blurred].filter(w => words.map(x=>x.replace(/[,\.]/g,'')).includes(w)));
  words.forEach(word => {
    const clean = word.replace(/[,\.!?]/g,'');
    if (seen.has(clean)) return;
    seen.add(clean);
    const chip = document.createElement('div');
    chip.className = 'chip' + (blurred.has(clean) ? ' on' : '');
    chip.textContent = clean;
    chip.onclick = () => {
      if (blurred.has(clean)) { blurred.delete(clean); chip.classList.remove('on'); }
      else { blurred.add(clean); chip.classList.add('on'); }
    };
    container.appendChild(chip);
  });
}

function generate() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!selectedImg && !prompt) { alert('Please select an image first!'); return; }
  const s = {
    id: Date.now(),
    prompt: prompt,
    model: document.getElementById('aiModel').value,
    category: document.getElementById('category').value,
    bgUrl: selectedImg ? selectedImg.image_url : '',
    blurred: new Set(blurred)
  };
  slides.push(s);
  renderGrid();
  setTimeout(() => drawSlide(s), 100);
}

function renderGrid() {
  const wrap = document.getElementById('slidesWrap');
  const grid = document.getElementById('grid');
  wrap.style.display = slides.length ? 'block' : 'none';
  grid.innerHTML = '';
  slides.forEach(s => {
    const div = document.createElement('div');
    div.className = 'slide-item';
    div.innerHTML = `
      <div class="canvas-wrap"><canvas id="c${s.id}" width="${W}" height="${H}"></canvas></div>
      <div class="slide-btns">
        <button class="s-btn s-dl" onclick="dlSlide(${s.id})">↓ Download 1080×1440</button>
        <button class="s-btn s-rm" onclick="rmSlide(${s.id})">✕</button>
      </div>`;
    grid.appendChild(div);
  });
}

function drawSlide(s) {
  const canvas = document.getElementById('c' + s.id);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  const paint = (hasImg) => {
    // Black base
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    if (hasImg) {
      // Image already drawn underneath — add gradient overlay over bottom 45%
      const gradStart = H * 0.45;
      const grad = ctx.createLinearGradient(0, gradStart, 0, H);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(0.35, 'rgba(0,0,0,0.75)');
      grad.addColorStop(1, 'rgba(0,0,0,0.97)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, gradStart, W, H - gradStart);
    }

    // /prompt label
    const promptLabelY = H * 0.68;
    ctx.font = '800 80px Syne, serif';
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
    ctx.fillText('/prompt', 52, promptLabelY);

    // Prompt text below label
    const words = s.prompt.split(' ');
    let wx = 52, wy = promptLabelY + 48;
    const lh = 38, maxX = W - 52, fs = 22;
    ctx.font = `400 ${fs}px Share Tech Mono, monospace`;
    ctx.textBaseline = 'alphabetic';

    words.forEach(word => {
      const clean = word.replace(/[,\.!?]/g,'');
      const ww = ctx.measureText(word + ' ').width;
      if (wx + ww > maxX && wx > 52) { wx = 52; wy += lh; }
      if (wy > H - 80) return;

      if (s.blurred.has(clean)) {
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.fillRect(wx-2, wy-fs, ww+2, fs+8);
        ctx.filter = 'blur(7px)';
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillText(word + ' ', wx, wy);
        ctx.filter = 'none';
        ctx.restore();
      } else {
        ctx.fillStyle = 'rgba(220,220,220,0.88)';
        ctx.fillText(word + ' ', wx, wy);
      }
      wx += ww;
    });

    // AFTERFRAME watermark top left
    ctx.font = '800 28px Syne, serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.textBaseline = 'top';
    ctx.fillText('AFTERFRAME', 52, 40);

    // Model + category tag top right
    ctx.font = '400 18px Share Tech Mono, monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.textAlign = 'right';
    ctx.fillText(s.model + ' // ' + s.category.toUpperCase(), W-52, 46);
    ctx.textAlign = 'left';
  };

  if (s.bgUrl) {
    // Fetch image as blob to bypass CORS
    fetch(s.bgUrl)
      .then(r => r.blob())
      .then(blob => {
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
          const imgAR = img.width / img.height;
          const canAR = W / H;
          let sx=0, sy=0, sw=img.width, sh=img.height;
          if (imgAR > canAR) { sw = img.height * canAR; sx = (img.width - sw) / 2; }
          else { sh = img.width / canAR; sy = (img.height - sh) / 2; }
          ctx.drawImage(img, sx, sy, sw, sh, 0, 0, W, H);
          URL.revokeObjectURL(url);
          paint(true);
        };
        img.onerror = () => paint(false);
        img.src = url;
      })
      .catch(() => paint(false));
  } else {
    paint(false);
  }
}

function dlSlide(id) {
  const c = document.getElementById('c' + id);
  const a = document.createElement('a');
  a.download = 'afterframe-slide-' + id + '.png';
  a.href = c.toDataURL('image/png');
  a.click();
}
function dlAll() { slides.forEach((s,i) => setTimeout(() => dlSlide(s.id), i*500)); }
function rmSlide(id) { slides = slides.filter(s=>s.id!==id); renderGrid(); }
function clearAll() {
  slides=[]; blurred=new Set(); selectedImg=null;
  renderGrid();
  document.getElementById('prompt').value='';
  document.getElementById('chips').innerHTML='';
  document.getElementById('selPreview').style.display='none';
  document.querySelectorAll('.img-thumb').forEach(t=>t.classList.remove('selected'));
}
</script>
</body>
</html>
