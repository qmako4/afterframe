<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFTERFRAME — Slide Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; color: #b8d8b8; font-family: 'Share Tech Mono', monospace; min-height: 100vh; padding: 16px; }
.app { max-width: 1100px; margin: 0 auto; }
.header { text-align: center; padding: 16px 0 24px; }
.header h1 { font-family: 'Syne', sans-serif; font-size: clamp(20px, 5vw, 30px); font-weight: 800; letter-spacing: clamp(4px, 2vw, 8px); color: #4dff4d; margin-bottom: 4px; }
.header p { font-size: clamp(8px, 2vw, 10px); letter-spacing: clamp(2px, 1vw, 4px); color: #4a6e4a; }
.panel { background: #080808; border: 1px solid #1a1a1a; border-radius: 12px; padding: clamp(16px, 4vw, 24px); margin-bottom: 16px; }
.panel-label { font-size: 9px; letter-spacing: 3px; color: #4dff4d; text-transform: uppercase; margin-bottom: 14px; display: block; }
.img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 6px; max-height: 320px; overflow-y: auto; padding-right: 4px; -webkit-overflow-scrolling: touch; }
.img-grid::-webkit-scrollbar { width: 4px; }
.img-grid::-webkit-scrollbar-thumb { background: #4dff4d; border-radius: 2px; }
.img-thumb { position: relative; aspect-ratio: 3/4; overflow: hidden; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; background: #0a0a0a; }
.img-thumb.selected { border-color: #4dff4d; }
.img-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.img-thumb .tick { position: absolute; top: 4px; right: 4px; background: #4dff4d; color: #000; width: 20px; height: 20px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
.img-thumb.selected .tick { display: flex; }
.loading-msg { color: #333; font-size: 12px; letter-spacing: 2px; padding: 24px; text-align: center; grid-column: 1/-1; }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.field label { font-size: 9px; letter-spacing: 2px; color: #4a6e4a; text-transform: uppercase; }
.field textarea { background: #030303; border: 1px solid #1a1a1a; color: #ddd; font-family: 'Share Tech Mono', monospace; font-size: 13px; padding: 11px 14px; border-radius: 8px; outline: none; transition: border-color 0.2s; width: 100%; resize: vertical; min-height: 90px; -webkit-appearance: none; }
.field textarea:focus { border-color: #4dff4d; }
.sel-preview { display: flex; align-items: center; gap: 10px; background: rgba(77,255,77,0.04); border: 1px solid rgba(77,255,77,0.15); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; }
.sel-preview img { width: 40px; height: 54px; object-fit: cover; border-radius: 5px; flex-shrink: 0; }
.sel-info { flex: 1; min-width: 0; }
.sel-prompt { font-size: 11px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.clr-sel { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #333; background: none; border: none; cursor: pointer; padding: 4px; flex-shrink: 0; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn { font-family: 'Share Tech Mono', monospace; font-size: clamp(10px, 2.5vw, 11px); letter-spacing: 1px; padding: clamp(11px, 3vw, 13px) clamp(18px, 5vw, 28px); cursor: pointer; border-radius: 100px; transition: all 0.2s; border: none; text-transform: uppercase; -webkit-tap-highlight-color: transparent; }
.btn-g { background: #4dff4d; color: #000; font-weight: 700; }
.btn-o { background: transparent; color: #555; border: 1px solid #1a1a1a; }
.slides-wrap { margin-top: 8px; }
.slides-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
.slides-top span { font-size: 9px; letter-spacing: 3px; color: #4dff4d; text-transform: uppercase; }
.dl-all { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 8px 16px; cursor: pointer; border-radius: 100px; background: transparent; border: 1px solid #1a1a1a; color: #555; transition: all 0.2s; text-transform: uppercase; -webkit-tap-highlight-color: transparent; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr)); gap: 16px; }
.canvas-wrap { width: 100%; aspect-ratio: 9/16; background: #000; border: 1px solid #1a1a1a; border-radius: 8px; overflow: hidden; }
canvas { width: 100%; height: 100%; display: block; }
.slide-btns { display: flex; gap: 8px; margin-top: 8px; }
.s-btn { flex: 1; font-family: 'Share Tech Mono', monospace; font-size: clamp(9px, 2.5vw, 10px); letter-spacing: 1px; padding: 10px 6px; cursor: pointer; border-radius: 6px; transition: all 0.2s; text-transform: uppercase; -webkit-tap-highlight-color: transparent; }
.s-dl { background: #4dff4d; color: #000; border: none; font-weight: 700; }
.s-rm { background: transparent; color: #444; border: 1px solid #1a1a1a; }

@media (max-width: 480px) {
  body { padding: 12px; }
  .panel { padding: 14px; }
  .img-grid { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); max-height: 260px; }
  .btn-row { flex-direction: column; }
  .btn { text-align: center; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>AFTERFRAME</h1>
    <p>> INSTAGRAM SLIDE GENERATOR // 1080 × 1920 — 9:16</p>
  </div>

  <div class="panel">
    <span class="panel-label">> Step 1 — Select an image from your library</span>
    <div class="img-grid" id="imgGrid"><div class="loading-msg">Loading your images...</div></div>
  </div>

  <div class="panel">
    <span class="panel-label">> Step 2 — Review and generate</span>
    <div id="selPreview" style="display:none;" class="sel-preview">
      <img id="prevImg" src="" alt="">
      <div class="sel-info"><div class="sel-prompt" id="prevPromptTxt"></div></div>
      <button class="clr-sel" onclick="clearSel()">✕</button>
    </div>
    <div class="field">
      <label>Prompt (auto-filled — edit if needed)</label>
      <textarea id="prompt" placeholder="Select an image above — prompt auto-fills..."></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-g" onclick="generate()">+ Generate slide</button>
      <button class="btn btn-o" onclick="clearAll()">Clear all</button>
    </div>
  </div>

  <div class="slides-wrap" id="slidesWrap" style="display:none;">
    <div class="slides-top">
      <span>> Generated slides (1080×1920 — 9:16)</span>
      <button class="dl-all" onclick="dlAll()">↓ Download all</button>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
const SB_URL = 'https://jbsyzrzoiawruusdowpx.supabase.co';
const SB_KEY = 'sb_publishable_5yHqsw-CdIykq2jiCDwTpw_otaDsUlF';
const W = 1080, H = 1920;
let slides = [], selectedImg = null, allImages = [];

// Blur ~52% of words - technical, quality and style terms
const BLUR_WORDS = new Set([
  // Camera brands
  'sony','canon','nikon','hasselblad','leica','fuji','kodak','pentax','mamiya',
  'arri','alexa','a7r','a7','a1','r5','r3','d850','gh6',
  // Lens specs
  '35mm','50mm','85mm','24mm','70mm','135mm','14mm','28mm','200mm',
  // Camera tech
  'iso','dslr','mirrorless','aperture','shutter','lens','bokeh',
  // Quality buzzwords
  'photorealistic','hyperrealistic','ultrarealistic','realistic',
  '8k','4k','hdr','raw','subsurface','scattering','raytracing',
  'octane','cgi','render','rendering','specular','albedo',
  // Technical photo
  'pores','anamorphic','chromatic','aberration','vignette','grain',
  'sharpness','clarity','contrast','saturation','exposure','depth',
  // Midjourney params
  '--ar','--v','--s','--style','--no','--q','--chaos','--seed','--exp',
  // Quality descriptors
  'masterpiece','intricate','hyperdetailed','ultra-detailed','high-quality',
  'photographic','photograph','photography','sharp','focus','resolution',
  'detailed','ultra','hyper','super','high','highly',
  // Lighting technical
  'rembrandt','softbox','keylight','catchlight','backlit','backlight',
  'three-point','diffused','ambient','illuminated','lit',
  // Style tags
  'editorial','aesthetic','stylized','cinematic','film','anamorphic',
  // Filler quality adjectives
  'stunning','gorgeous','breathtaking','exquisite','incredible','perfect',
  'perfectly','extremely','professional','premium','luxurious','sophisticated',
  // Shot/composition terms
  'shot','captured','taken','closeup','close-up','angle','framing',
  'composition','perspective','medium','wide','aerial','overhead',
]);

function shouldBlur(word) {
  const w = word.replace(/[,\.!?;:]/g,'').toLowerCase();
  if (w.length <= 2) return false;
  if (w.startsWith('--')) return true;
  if (w.includes('f/')) return true;
  if (/^\d+mm$/.test(w)) return true;
  if (/^\d+k$/.test(w)) return true;

  // Always blur these specific words
  const alwaysBlur = new Set([
    'sony','canon','nikon','hasselblad','leica','fuji','kodak','pentax','mamiya',
    'arri','alexa','a7r','a7','a1','r5','r3','d850','gh6',
    '35mm','50mm','85mm','24mm','70mm','135mm','14mm','28mm','200mm',
    'iso','dslr','mirrorless','aperture','shutter','lens','bokeh',
    'photorealistic','hyperrealistic','ultrarealistic','realistic',
    '8k','4k','hdr','raw','subsurface','scattering','raytracing',
    'octane','cgi','render','rendering','specular','albedo',
    'pores','anamorphic','chromatic','aberration','vignette','grain',
    'sharpness','clarity','contrast','saturation','exposure','depth',
    'masterpiece','intricate','hyperdetailed','ultra-detailed','high-quality',
    'photographic','photograph','photography','sharp','focus','resolution',
    'detailed','ultra','hyper','super','highly',
    'rembrandt','softbox','keylight','catchlight','backlit','backlight',
    'diffused','ambient','illuminated',
    'editorial','aesthetic','stylized','cinematic','film',
    'stunning','gorgeous','breathtaking','exquisite','incredible','perfect',
    'perfectly','extremely','professional','premium','luxurious','sophisticated',
    'composition','perspective','framing','overhead','aerial',
    'dramatic','dynamic','vibrant','atmospheric','immersive','ethereal',
    'majestic','pristine','serene','tranquil','vivid','lush','sweeping',
    'diagonal','diagonally','further','toward','between','leading',
    'slightly','directly','partially','gently','softly','gradually',
    'flowing','rushing','cascading','glowing','shimmering','reflecting',
    'turquoise','glacial','riverbank','wildflowers','foreground',
    'background','midground','shirtless','upright','leaning',
  ]);

  if (alwaysBlur.has(w)) return true;

  // Blur every other word deterministically using char code sum
  // This guarantees ~50% of remaining words are blurred
  const charSum = w.split('').reduce((s, c) => s + c.charCodeAt(0), 0);
  if (charSum % 3 === 0) return true;

  return false;
}

function drawBlurredWord(ctx, word, x, y, fs) {
  const ww = ctx.measureText(word + ' ').width;
  ctx.save();
  // Draw the word first very faintly
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.font = `400 ${fs}px Share Tech Mono, monospace`;
  ctx.fillText(word, x, y);
  // Draw solid redaction bar over it - completely covers the word
  const barH = fs + 8;
  const barY = y - fs - 1;
  ctx.fillStyle = 'rgba(60,60,60,0.92)';
  ctx.fillRect(x - 2, barY, ww - 4, barH);
  // Subtle lighter inner highlight to give it depth
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.fillRect(x - 2, barY, ww - 4, 1);
  ctx.restore();
}

window.onload = async function() {
  try {
    const r = await fetch(SB_URL + '/rest/v1/images?select=*&order=created_at.desc&limit=80', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    allImages = await r.json();
    if (!Array.isArray(allImages)) allImages = [];
    renderImgGrid();
  } catch(e) {
    document.getElementById('imgGrid').innerHTML = '<div class="loading-msg">Failed to load — check connection</div>';
  }
};

function renderImgGrid() {
  const grid = document.getElementById('imgGrid');
  if (!allImages.length) { grid.innerHTML = '<div class="loading-msg">No images found — upload some in your admin panel first!</div>'; return; }
  grid.innerHTML = allImages.map(img => `
    <div class="img-thumb" id="th-${img.id}" onclick="selectImg('${img.id}')">
      <img src="${img.image_url}" alt="" loading="lazy" onerror="this.closest('.img-thumb').style.display='none'">
      <div class="tick">✓</div>
    </div>`).join('');
}

function selectImg(id) {
  const img = allImages.find(i => i.id === id);
  if (!img) return;
  selectedImg = img;
  document.querySelectorAll('.img-thumb').forEach(t => t.classList.remove('selected'));
  document.getElementById('th-' + id).classList.add('selected');
  document.getElementById('prompt').value = img.prompt || '';
  document.getElementById('prevImg').src = img.image_url;
  document.getElementById('prevPromptTxt').textContent = img.prompt || '';
  document.getElementById('selPreview').style.display = 'flex';
  document.querySelector('.panel:nth-child(3)').scrollIntoView({ behavior: 'smooth' });
}

function clearSel() {
  selectedImg = null;
  document.querySelectorAll('.img-thumb').forEach(t => t.classList.remove('selected'));
  document.getElementById('selPreview').style.display = 'none';
  document.getElementById('prompt').value = '';
}

function generate() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) { alert('Please select an image or enter a prompt'); return; }
  const s = {
    id: Date.now(),
    prompt,
    bgUrl: selectedImg ? selectedImg.image_url : ''
  };
  slides.push(s);
  renderGrid();
  setTimeout(() => drawSlide(s), 100);
}

function renderGrid() {
  const wrap = document.getElementById('slidesWrap');
  const grid = document.getElementById('grid');
  wrap.style.display = slides.length ? 'block' : 'none';
  grid.innerHTML = '';
  slides.forEach(s => {
    const div = document.createElement('div');
    div.innerHTML = `
      <div class="canvas-wrap"><canvas id="c${s.id}" width="${W}" height="${H}"></canvas></div>
      <div class="slide-btns">
        <button class="s-btn s-dl" onclick="dlSlide(${s.id})">↓ Download 9:16</button>
        <button class="s-btn s-rm" onclick="rmSlide(${s.id})">✕</button>
      </div>`;
    grid.appendChild(div);
  });
}

function blurCanvas(ctx, x, y, w, h, radius) {
  if (w <= 0 || h <= 0) return;
  const imgData = ctx.getImageData(x, y, w, h);
  const pixels = imgData.data;
  const width = w, height = h;
  const passes = Math.ceil(radius / 2);
  for (let pass = 0; pass < passes; pass++) {
    for (let py = 0; py < height; py++) {
      for (let px = 1; px < width - 1; px++) {
        const i = (py * width + px) * 4;
        const l = (py * width + px - 1) * 4;
        const r2 = (py * width + px + 1) * 4;
        for (let c = 0; c < 3; c++) {
          pixels[i+c] = (pixels[l+c] + pixels[i+c] * 2 + pixels[r2+c]) >> 2;
        }
      }
    }
    for (let px = 0; px < width; px++) {
      for (let py = 1; py < height - 1; py++) {
        const i = (py * width + px) * 4;
        const u = ((py-1) * width + px) * 4;
        const d = ((py+1) * width + px) * 4;
        for (let c = 0; c < 3; c++) {
          pixels[i+c] = (pixels[u+c] + pixels[i+c] * 2 + pixels[d+c]) >> 2;
        }
      }
    }
  }
  ctx.putImageData(imgData, x, y);
}

function drawSlide(s) {
  const canvas = document.getElementById('c' + s.id);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  const paint = (hasImg) => {
    if (!hasImg) {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
    }

    if (hasImg) {
      const grad = ctx.createLinearGradient(0, H * 0.58, 0, H);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(0.18, 'rgba(0,0,0,0.35)');
      grad.addColorStop(0.4, 'rgba(0,0,0,0.62)');
      grad.addColorStop(1, 'rgba(0,0,0,0.78)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, H * 0.58, W, H * 0.42);
    }

    // AFTERFRAME watermark
    ctx.font = '800 26px Syne, serif';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.textBaseline = 'top';
    ctx.textAlign = 'left';
    ctx.fillText('AFTERFRAME', 52, 44);

    // /prompt label — at 74% so image dominates
    const promptLabelY = H * 0.75;
    ctx.font = '800 72px Syne, serif';
    ctx.fillStyle = 'rgba(255,255,255,0.93)';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('/prompt', 52, promptLabelY);

    // Only show first 18 words of prompt max to keep text compact
    const allWords = s.prompt.split(' ');
    const words = allWords.slice(0, 18);
    const hasMore = allWords.length > 18;

    let wx = 52, wy = promptLabelY + 52;
    const lh = 40, maxX = W - 52, fs = 21;
    ctx.font = `400 ${fs}px Share Tech Mono, monospace`;
    ctx.textBaseline = 'alphabetic';

    // Pass 1 — draw all words
    const blurRegions = [];
    words.forEach(word => {
      const ww = ctx.measureText(word + ' ').width;
      if (wx + ww > maxX && wx > 52) { wx = 52; wy += lh; }
      if (wy > H - 80) { wx += ww; return; }
      ctx.fillStyle = 'rgba(210,210,210,0.88)';
      ctx.font = `400 ${fs}px Share Tech Mono, monospace`;
      ctx.fillText(word + ' ', wx, wy);
      if (shouldBlur(word)) {
        const bx = Math.max(0, Math.floor(wx) - 2);
        const by = Math.max(0, Math.floor(wy) - fs - 2);
        const bw = Math.min(W - bx, Math.ceil(ww) + 4);
        const bh = fs + 12;
        blurRegions.push({ bx, by, bw, bh });
      }
      wx += ww;
    });

    // Pass 2 — pixel blur each region individually
    blurRegions.forEach(({ bx, by, bw, bh }) => {
      try { blurCanvas(ctx, bx, by, bw, bh, 12); } catch(e) {}
    });

    // Draw ... if prompt was truncated
    if (hasMore) {
      ctx.fillStyle = 'rgba(210,210,210,0.5)';
      ctx.font = `400 ${fs}px Share Tech Mono, monospace`;
      ctx.fillText('...', wx, wy);
    }
  };

  if (s.bgUrl) {
    // Strip any Supabase transform params to get full resolution
    const fullResUrl = s.bgUrl.split('?')[0];
    fetch(fullResUrl)
      .then(r => { if (!r.ok) throw new Error(); return r.blob(); })
      .then(blob => {
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
          const imgAR = img.width / img.height;
          const canAR = W / H;
          let sx=0, sy=0, sw=img.width, sh=img.height;
          if (imgAR > canAR) { sw = img.height * canAR; sx = (img.width - sw) / 2; }
          else { sh = img.width / canAR; sy = (img.height - sh) / 2; }
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = 'high';
          ctx.drawImage(img, sx, sy, sw, sh, 0, 0, W, H);
          URL.revokeObjectURL(url);
          paint(true);
        };
        img.onerror = () => paint(false);
        img.src = url;
      })
      .catch(() => paint(false));
  } else {
    paint(false);
  }
}

function dlSlide(id) {
  const c = document.getElementById('c' + id);
  const dataUrl = c.toDataURL('image/png', 1.0);
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  if (isIOS) {
    // iOS Safari — open in new tab so user can long-press save
    const win = window.open();
    win.document.write(`
      <html><body style="margin:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh">
      <p style="color:#4dff4d;font-family:monospace;font-size:13px;padding:16px;text-align:center">
        Long press the image below and tap "Save to Photos"
      </p>
      <img src="${dataUrl}" style="width:100%;max-width:600px;display:block">
      </body></html>
    `);
  } else {
    const a = document.createElement('a');
    a.download = 'afterframe-slide-' + id + '.png';
    a.href = dataUrl;
    a.click();
  }
}
function dlAll() { slides.forEach((s,i) => setTimeout(() => dlSlide(s.id), i*500)); }
function rmSlide(id) { slides = slides.filter(s=>s.id!==id); renderGrid(); }
function clearAll() {
  slides=[]; selectedImg=null; renderGrid();
  document.getElementById('prompt').value='';
  document.getElementById('selPreview').style.display='none';
  document.querySelectorAll('.img-thumb').forEach(t=>t.classList.remove('selected'));
}
</script>
</body>
</html>
